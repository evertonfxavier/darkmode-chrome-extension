<!DOCTYPE html>
<html>
  <head>
    <title>Generate NightOwl Icons</title>
    <style>
      body {
        font-family: system-ui;
        padding: 20px;
        background: #1a1a2e;
        color: white;
      }
      canvas {
        display: block;
        margin: 10px 0;
        border: 1px solid #333;
      }
      .icon-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      .icon-item {
        text-align: center;
      }
      a {
        color: #8b5cf6;
      }
    </style>
  </head>
  <body>
    <h1>🦉 NightOwl Icon Generator</h1>
    <p>Right-click and save each icon, or click the download links.</p>

    <div class="icon-container" id="icons"></div>

    <script>
      const sizes = [16, 32, 48, 128];
      const container = document.getElementById("icons");

      sizes.forEach((size) => {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Create gradient background
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, "#8b5cf6");
        gradient.addColorStop(1, "#6d28d9");

        // Draw rounded rectangle
        const radius = size * 0.1875;
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, radius);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw moon circle
        const centerX = size / 2;
        const centerY = size / 2;
        const moonRadius = size * 0.25;

        ctx.beginPath();
        ctx.arc(centerX, centerY, moonRadius, 0, Math.PI * 2);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = Math.max(1, size * 0.05);
        ctx.stroke();

        // Draw half moon fill
        ctx.beginPath();
        ctx.arc(centerX, centerY, moonRadius - 0.5, -Math.PI / 2, Math.PI / 2);
        ctx.lineTo(centerX, centerY - moonRadius + 0.5);
        ctx.fillStyle = "#ffffff";
        ctx.fill();

        // Create download link
        const div = document.createElement("div");
        div.className = "icon-item";

        const scaledCanvas = document.createElement("canvas");
        scaledCanvas.width = Math.max(64, size);
        scaledCanvas.height = Math.max(64, size);
        const scaledCtx = scaledCanvas.getContext("2d");
        scaledCtx.imageSmoothingEnabled = false;
        const scale = Math.max(64, size) / size;
        scaledCtx.scale(scale, scale);
        scaledCtx.drawImage(canvas, 0, 0);

        div.appendChild(scaledCanvas);

        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = `icon${size}.png`;
        link.textContent = `Download icon${size}.png`;
        link.style.display = "block";
        link.style.marginTop = "5px";

        div.appendChild(link);
        container.appendChild(div);
      });
    </script>
  </body>
</html>
